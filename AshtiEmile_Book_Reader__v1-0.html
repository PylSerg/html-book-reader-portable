<!DOCTYPE html>
<html lang="">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AshtiEmile Reader</title>

    <style>
        :root {
            --interface-background-color: #fff;
            --interface-font-size: 18px;
            --scrollbar-thumb-height: auto;
            --scrollbar-progress: 0%;

            --book-font-family: Arial, Helvetica, sans-serif;
            --book-font-size: 20px;
            --book-font-weight: normal;
            --book-font-style: normal;
            --book-line-height: 1.5em;
            --book-horizontal-paddings: 20%;
            --book-vertical-paddings: 2%;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-inline: 0px;
            margin-top: 20px;
            margin-bottom: 0px;
            background-color: var(--interface-background-color);
            color: #000;
            font-size: 20px;
            font-family: Arial, Helvetica, sans-serif;
        }

        body::-webkit-scrollbar {
            width: 10px;
            color: #fff;
            background-color: #fff;
            outline: 1px solid #000;
        }

        body::-webkit-scrollbar-thumb {
            height: var(--scrollbar-thumb-height);
            background-color: #000;
            cursor: pointer;
        }

        body::-webkit-scrollbar-track {
            background: linear-gradient(to bottom,
                    #000 var(--scrollbar-progress),
                    #fff var(--scrollbar-progress));
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            text-align: center;
        }

        .dialog_window {
            position: fixed;
            top: 0;
            bottom: 0;
            width: 100vw;
            height: 100vh;
            display: none;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.75);
            pointer-events: all;
            z-index: 1001;
        }

        .dialog_window__container {
            max-width: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 10px;
            background-color: var(--interface-background-color);
            border: 3px solid #000;
            border-radius: 10px;
            overflow: hidden;
        }

        .dialog_window__text {
            padding: 20px;
            cursor: default;
        }

        .dialog_window__buttons {
            display: flex;
            flex-direction: row;
            justify-content: center;
            width: 100%;
            margin-top: 20px;
            border-top: 1px solid #000;
        }

        .dialog_window__button {
            width: 50%;
            padding: 10px;
            font-size: var(--interface-font-size);
            background: var(--interface-background-color);
            border: none;
            cursor: pointer;

            &:not(:last-child) {
                border-inline-end: 1px solid #000;
            }

            &:hover {
                background-color: #000;
                color: #fff;
            }
        }

        .close_zone {
            position: fixed;
            top: 0;
            inset-inline-start: 0;
            display: none;
            width: 100vw;
            height: 100vh;
            background-color: transparent;
            pointer-events: all;
            z-index: 1000;
        }

        .toolbar__container {
            position: fixed;
            top: 0;
            inset-inline-start: 0;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            width: 100%;
            height: 20px;
            border-bottom: 1px solid #000;
            background-color: var(--interface-background-color);
            z-index: 999;
        }

        .toolbar__left_side,
        .toolbar__right_side {
            display: flex;
            flex-direction: row;
            align-items: center;
        }

        .toolbar__button {
            height: 100%;
            padding: 0 10px;
            background-color: transparent;
            border: 2px solid transparent;
            border: none;
            color: #000;
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            cursor: pointer;

            &:hover {
                background-color: #000;
                color: #fff;
            }
        }

        .toolbar__title {
            margin-inline-start: 10px;
            font-size: 14px;
            font-weight: 700;
            cursor: default;
        }

        .toolbar__progress_indicator,
        .toolbar__time,
        .toolbar__battery_info,
        .reload_page_button {
            color: #555;
            font-size: 14px;
            cursor: default;
        }

        .toolbar__progress_indicator {
            display: none;
            padding-inline-end: 10px;
            border-inline-end: 1px solid #888;
            cursor: default;
        }

        .toolbar__battery_info,
        .toolbar__time {
            margin-inline-start: 10px;
        }

        .reload_page_button {
            height: 100%;
            font-weight: 700;
            background-color: var(--interface-background-color);
            border: none;
            margin: 0;
            padding: 0 10px;
            cursor: pointer;

            &:hover {
                background-color: #000;
                color: #fff;
            }
        }

        .toolbox__container {
            position: fixed;
            inset-inline-start: 10px;
            top: 30px;
            display: none;
            max-height: 70vh;
            padding: 5px;
            background-color: var(--interface-background-color);
            border: 3px solid #000;
            border-radius: 10px;
            box-shadow: 5px 5px 10px #555;
            overflow: auto;
            z-index: 1001;

            & div {
                flex-direction: column;
                flex-wrap: nowrap;
                justify-content: start;
                align-items: start;
            }
        }

        .toolbox__button {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            width: 100%;
            padding: 20px;
            background-color: transparent;
            border: 2px solid transparent;
            border: none;
            color: #000;
            font-size: var(--interface-font-size);
            text-align: start;
            cursor: pointer;

            &:not(:last-child) {
                border-bottom: 2px solid #000;
            }
        }

        .toolbox__button:hover {
            color: #fff;
            background-color: #000;

            &:first-child {
                border-radius: 5px 5px 0 0;
            }

            &:last-child {
                border-radius: 0 0 5px 5px;
            }
        }

        .toolbox__container .toolbox__item {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 20px;
            background-color: transparent;
            border: none;
            color: #000;
            font-size: var(--interface-font-size);
            text-align: start;
            box-sizing: border-box;
            cursor: default;

            &:not(:last-child) {
                border-bottom: 2px solid #000;
            }
        }

        .toolbox__container .toolbox__control_group {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 15px;
            margin-inline-start: 20px;
        }

        .toolbox__control_btn {
            background-color: transparent;
            border: 2px solid #000;
            border-radius: 5px;
            color: #000;
            font-size: var(--interface-font-size);
            font-weight: bold;
            width: 30px;
            height: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-sizing: border-box;

            &:hover {
                background-color: #000;
                color: #fff;
            }
        }

        .toolbox__control_val {
            font-weight: bold;
            min-width: 30px;
            text-align: center;
        }

        .toolbox__control_toggle {
            background-color: transparent;
            border: 2px solid #000;
            border-radius: 5px;
            color: #000;
            font-size: var(--interface-font-size);
            font-weight: bold;
            height: 30px;
            padding: 0 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-sizing: border-box;

            &:hover,
            &.active {
                background-color: #000;
                color: #fff;
            }
        }

        .toolbox__select {
            padding: 2px 5px;
            font-size: calc(var(--interface-font-size) - 2px);
            border: 2px solid #000;
            border-radius: 5px;
            background-color: var(--interface-background-color);
            color: #000;
            cursor: pointer;
            outline: none;
            max-width: 150px;
        }

        .toolbox__main_tools {
            display: flex;
        }

        .toolbox__language_list {
            display: none;
        }

        .toolbox__reader_tools {
            display: none;
        }

        .library__container {
            width: 100%;
            max-width: 800px;
        }

        .search__container {
            position: relative;
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            width: 100%;
            margin-top: 10px;
            margin-bottom: 30px;
            border-bottom: 1px solid #aaa;
        }

        .search_field {
            width: 100%;
            margin: 0;
            padding: 6px;
            padding-inline-end: calc(var(--interface-font-size)*2);
            border: none;
            font-size: var(--interface-font-size);
            font-style: italic;

            &::placeholder {
                color: #aaa;
                font-style: italic;
            }

            &:focus-visible {
                outline: none;

                &::placeholder {
                    color: transparent;
                }
            }
        }

        .search_clear_button {
            position: absolute;
            top: 0;
            inset-inline-end: 0;
            margin: 0;
            padding: 1px 10px;
            color: #aaa;
            font-size: var(--interface-font-size);
            font-weight: bold;
            background-color: var(--interface-background-color);
            border: none;
            cursor: pointer;

            &:hover {
                background-color: #000;
                color: #fff;
            }
        }

        .library__book_list__empty {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 50px;
            margin-top: 50px;
            width: 100%;
            height: 100%;
            color: #888;
            font-style: italic;
        }

        .library__book_list {
            padding: 0 10px;
            margin-bottom: 300px;
        }

        .author__section {
            margin-bottom: 30px;
            border: 3px solid #000;
            border-radius: 10px;
            box-shadow: 5px 5px 10px #ccc;
        }

        .author__title {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            margin-bottom: 0px;
            padding: 10px;
            background-color: #eee;
            font-weight: bold;
            border-bottom: 3px solid #000;
            border-radius: 10px 10px 0 0;
            cursor: default;
        }

        .author__counter {
            margin-inline-start: 10px;
            color: #777;
            cursor: default;
        }

        .book__row {
            position: relative;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            padding: 10px;
            cursor: pointer;

            &:not(:last-child) {
                border-bottom: 1px solid #333;
            }

            &:hover {
                background-color: #000;
                color: #fff;
            }
        }

        .book__info {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .book__progress {
            margin-inline-start: 50px;
            color: #888;
            font-style: italic;
        }

        .book__actions_button {
            padding: 0 10px;
            border-radius: 5px;

            &:hover {
                background-color: var(--interface-background-color);
                color: #000;
            }
        }

        .actions_tools__container {
            position: absolute;
            top: 40px;
            inset-inline-end: 0;
            display: flex;
            flex-direction: column;
            max-height: 70vh;
            padding: 5px;
            background-color: var(--interface-background-color);
            border: 3px solid #000;
            border-radius: 10px;
            box-shadow: -5px 5px 10px #555;
            overflow: auto;
            z-index: 1001;
        }

        .rename_book__form {
            display: flex;
            flex-direction: column;
        }

        .rename_book__input {
            margin-top: 10px;
            margin-bottom: 30px;
            font-size: var(--book-font-size);
            border: none;
            border-bottom: 2px solid #aaa;
            outline: none;
        }

        .rename_book__question {
            margin-top: 30px;
            text-align: center;
        }

        .reader__container {
            width: 100%;
        }

        .reader__book {
            display: block;
            /* changed from flex to properly flow text */
            font-family: var(--book-font-family);
            font-size: var(--book-font-size);
            font-weight: var(--book-font-weight);
            font-style: var(--book-font-style);
            line-height: var(--book-line-height);
            text-align: justify;
            padding: var(--book-vertical-paddings) var(--book-horizontal-paddings);
            padding-bottom: 90vh;
        }

        .reader__book p {
            text-indent: 2em;
        }
    </style>
</head>

<body>
    <div class="close_zone" data-close-zone></div>
    <input type="file" accept=".html" multiple style="display: none;" data-add-file-input>

    <div class="toolbar__container">
        <div class="toolbar__left_side">
            <button class="toolbar__button" type="button" data-toolbox-toggle-button>≡</button>
            <span class="toolbar__title" data-toolbar-title></span>
        </div>

        <div class="toolbar__right_side">
            <span class="toolbar__progress_indicator" data-toolbar-progress-indicator></span>
            <span class="toolbar__time" data-toolbar-time></span>
            <span class="toolbar__battery_info" data-toolbar-battery-info></span>
            <button class="reload_page_button" type="button" data-reload-page>↻</button>
        </div>
    </div>

    <div class="toolbox__container" data-toolbox-container>
        <div class="toolbox__libraty_tools" data-library-tools>
            <div class="toolbox__main_tools" data-toolbox-main-tools>
                <button class="toolbox__button" type="button" data-full-screen-button></button>
                <button class="toolbox__button" type="button" data-add-book-button></button>
                <button class="toolbox__button" type="button" data-clear-library-button></button>
                <button class="toolbox__button" type="button" data-language-button></button>
            </div>

            <div class="toolbox__language_list" data-language-list>
                <button class="toolbox__button" type="button" value="back" data-back-button></button>
            </div>
        </div>

        <div class="toolbox__reader_tools" data-reader-tools>
            <button class="toolbox__button" type="button" data-back-to-library-button></button>
            <button class="toolbox__button" type="button" data-full-screen-button2></button>
            <div class="toolbox__item">
                <span data-font-family-label></span>
                <select class="toolbox__select" data-font-family-select>
                    <option value="Arial, Helvetica, sans-serif" style="font-family: Arial, Helvetica, sans-serif">Arial</option>
                    <option value="'Times New Roman', Times, serif" style="font-family: 'Times New Roman', Times, serif">Times New Roman</option>
                    <option value="'Courier New', Courier, monospace" style="font-family: 'Courier New', Courier, monospace">Courier New</option>
                    <option value="Georgia, serif" style="font-family: Georgia, serif">Georgia</option>
                    <option value="Verdana, sans-serif" style="font-family: Verdana, sans-serif">Verdana</option>
                    <option value="Tahoma, sans-serif" style="font-family: Tahoma, sans-serif">Tahoma</option>
                    <option value="'Trebuchet MS', sans-serif" style="font-family: 'Trebuchet MS', sans-serif">Trebuchet MS</option>
                </select>
            </div>
            <div class="toolbox__item">
                <span data-font-style-label></span>
                <div class="toolbox__control_group">
                    <button type="button" class="toolbox__control_toggle" data-font-weight-button>B</button>
                    <button type="button" class="toolbox__control_toggle" data-font-style-button style="font-style: italic">I</button>
                </div>
            </div>
            <div class="toolbox__item">
                <span data-font-size-label></span>
                <div class="toolbox__control_group">
                    <button type="button" class="toolbox__control_btn" data-font-size-minus-button>-</button>
                    <span class="toolbox__control_val" data-font-size-value></span>
                    <button type="button" class="toolbox__control_btn" data-font-size-plus-button>+</button>
                </div>
            </div>
            <div class="toolbox__item">
                <span data-line-height-label></span>
                <div class="toolbox__control_group">
                    <button type="button" class="toolbox__control_btn" data-line-height-minus-button>-</button>
                    <span class="toolbox__control_val" data-line-height-value></span>
                    <button type="button" class="toolbox__control_btn" data-line-height-plus-button>+</button>
                </div>
            </div>
            <div class="toolbox__item">
                <span data-vertical-paddings-label></span>
                <div class="toolbox__control_group">
                    <button type="button" class="toolbox__control_btn" data-vertical-paddings-minus-button>-</button>
                    <span class="toolbox__control_val" data-vertical-paddings-value></span>
                    <button type="button" class="toolbox__control_btn" data-vertical-paddings-plus-button>+</button>
                </div>
            </div>
            <div class="toolbox__item">
                <span data-horizontal-paddings-label></span>
                <div class="toolbox__control_group">
                    <button type="button" class="toolbox__control_btn" data-horizontal-paddings-minus-button>-</button>
                    <span class="toolbox__control_val" data-horizontal-paddings-value></span>
                    <button type="button" class="toolbox__control_btn" data-horizontal-paddings-plus-button>+</button>
                </div>
            </div>
        </div>
    </div>

    <div class="library__container" data-library-container>
        <div class="search__container">
            <input class="search_field" type="text" name="search" data-search-field>
            <button class="search_clear_button" type="button" data-search-clear-button>⛌</button>
        </div>

        <div class="library__books_list" data-books-list></div>
    </div>

    <div class="reader__container" data-reader-container>
        <div class="reader__book" data-reader-book></div>
    </div>

    <div class="dialog_window" data-dialog-window>
        <div class="dialog_window__container">
            <div class="dialog_window__text" data-dialog-window-text></div>

            <div class="dialog_window__buttons">
                <button class="dialog_window__button" type="button" data-cancel-button></button>
                <button class="dialog_window__button" type="button" data-confirm-button></button>
            </div>
        </div>
    </div>

        // Initialize language settings
        async function init_language() {
            let stored_lang = await get_settings("lang");
            if (stored_lang) {
                lang = stored_lang;
            } else {
                lang = await set_language();
            }

            document.documentElement.setAttribute("lang", lang);
            translate_labels();

            // Creates languages list
            language_list.innerHTML = "";
            for (let l in translation.language) {
                const lang_button = document.createElement("button");

                lang_button.setAttribute("class", "toolbox__button");
                lang_button.setAttribute("value", l);
                lang_button.setAttribute("onclick", `change_language("${l}")`);

                if (l === lang) {
                    lang_button.textContent = "✓ " + translation.language[l];
                    lang_button.setAttribute("style", "font-weight: bold");
                } else {
                    lang_button.textContent = translation.language[l];
                };

                language_list.appendChild(lang_button);
            };
        }

        // Initialize font settings
        async function init_font() {
            let stored_font = await get_settings("font");

            if (!stored_font) {
                stored_font = await set_font();
            }

            // Defaults if missing
            stored_font.weight = stored_font.weight || "normal";
            stored_font.style = stored_font.style || "normal";

            root_style.setProperty("--book-font-family", stored_font.family);
            root_style.setProperty("--book-font-size", `${stored_font.size}px`);
            root_style.setProperty("--book-font-weight", stored_font.weight);
            root_style.setProperty("--book-font-style", stored_font.style);
            root_style.setProperty("--book-line-height", `${stored_font.lineHeight}em`);
            font_size_value.innerHTML = stored_font.size;
            line_height_value.innerHTML = stored_font.lineHeight;
            font_family_select.value = stored_font.family;
            font_family_select.style.fontFamily = stored_font.family;

            if (stored_font.weight === "bold") {
                font_weight_button.classList.add("active");
            } else {
                font_weight_button.classList.remove("active");
            }

            if (stored_font.style === "italic") {
                font_style_button.classList.add("active");
            } else {
                font_style_button.classList.remove("active");
            }
        }

        // Render books library
        function render_library() {
            disable_close_zone();
            close_toolbox();

            is_lib_screen = true;
            is_actions_tools = false;
            active_row_actions = false;
            active_book = false;
            book_position = false;

            toolbar_progress_indicator.style.display = "none";
            library_container.style.display = "block";
            reader_container.style.display = "none";
            root_style.setProperty("--scrollbar-progress", "0%");

            const tx = db.transaction("books", "readonly");
            const store = tx.objectStore("books");
            const requestAll = store.getAll();
            const search = search_field.value.toLowerCase();

            requestAll.onsuccess = () => {
                const books = requestAll.result;

                let recent = { recent: 0 };
                const favorites = [];
                const groups = {};

                if (!books[0]) {
                    books_list.setAttribute("class", "library__book_list__empty");
                    books_list.innerHTML = tr("library_empty");

                    const abb = document.createElement("div");
                    abb.setAttribute("onclick", "add_file_input.click()");
                    abb.setAttribute("style", "font-weight:bold;font-style:normal;cursor:pointer;");
                    abb.textContent = "➕ " + tr("add_book");
                    books_list.appendChild(abb);
                    return;
                };

                books_list.innerHTML = "";
                books_list.setAttribute("class", "library__book_list");

                books.forEach(b => {
                    if (b.recent > recent.recent && !b.read) recent = b;
                });

                books.filter(b => b.title.toLowerCase().includes(search) || b.author.toLowerCase().includes(search))
                    .forEach(b => {
                        if (b.favorite) favorites.push({ id: b.id, title: b.title, author: b.author, progress: b.progress, favorite: b.favorite, read: b.read });

                        if (!groups[b.author]) groups[b.author] = [];
                        groups[b.author].push({ id: b.id, title: b.title, author: b.author, progress: b.progress, favorite: b.favorite, read: b.read });
                    });

                // Recent book
                const rec = document.createElement("div");
                rec.setAttribute("class", "author__section");
                rec.setAttribute("style", "margin-bottom: 50px;");

                if (recent.title && !recent.read) {
                    rec.innerHTML = `
                        <div class="author__title">
                            <span>↪ &nbsp; ${tr("recent")}</span>
                        </div>
                    `;

                    books_list.appendChild(rec);

                    const row_id = id_gen();

                    const rec_book = document.createElement("div");
                    rec_book.setAttribute("class", "book__row");
                    rec_book.setAttribute("id", row_id);
                    rec_book.setAttribute("onclick", `open_book('${recent.id}')`);

                    rec_book.innerHTML = `
                        <div class="book__title">
                            <span>${recent.title} &nbsp;&nbsp;</span> 
                            <span style="color: #aaa; font-style: italic;">[ ${recent.author} ]</span>
                        </div>

                        <div class="book__info">
                            <div class="book__progress" title="${tr("read_title")}">${if_book_reading(recent.progress)}</div>
                            <div class="book__actions_button" title="${tr("book_actions_title")}" onclick="event.stopPropagation(); show_actions_tools('${recent.id}', ${recent.favorite}, ${recent.read}, '${row_id}')"><b>&#8942;</b></div>
                        </div>
                    `;

                    rec.appendChild(rec_book);
                };

                // Favorites books
                const fav = document.createElement("div");
                fav.setAttribute("class", "author__section");
                fav.setAttribute("style", "margin-bottom: 50px;");

                if (favorites.length > 0) {
                    fav.innerHTML = `
                        <div class="author__title">
                            <span>★ &nbsp; ${tr("favorite")}</span>
                            <span class="author__counter">${favorites.length}</span>
                        </div>
                    `;

                    books_list.appendChild(fav);

                    favorites.sort((a, b) => a.title.localeCompare(b.title)).forEach(book => {
                        const row_id = id_gen();

                        const fav_book = document.createElement("div");
                        fav_book.setAttribute("class", "book__row");
                        fav_book.setAttribute("id", row_id);
                        fav_book.setAttribute("onclick", `open_book('${book.id}')`);

                        fav_book.innerHTML = `
                            <div class="book__title">
                                <span>${book.title} &nbsp;&nbsp;</span> 
                                <span style="color: #aaa; font-style: italic;">[ ${book.author} ]</span>
                            </div>

                            <div class="book__info">
                                <div class="book__progress" title="${tr("read_title")}">${if_book_reading(book.progress, book.read)}</div>
                                <div class="book__actions_button" title="${tr("book_actions_title")}" onclick="event.stopPropagation(); show_actions_tools('${book.id}', ${book.favorite}, ${book.read}, '${row_id}')"><b>&#8942;</b></div>
                            </div>
                        `;

                        fav.appendChild(fav_book);
                    });
                };

                // All books
                Object.keys(groups).sort().forEach(author => {
                    const sec = document.createElement("div");
                    sec.setAttribute("class", "author__section");
                    sec.innerHTML = `
                            <div class="author__title">
                                <span>${author}</span>
                                <span class="author__counter" title="${tr('author_books_counter')}">${groups[author].length}</span>
                            </div >
                        `;

                    groups[author].sort((a, b) => a.title.localeCompare(b.title)).forEach(book => {
                        function if_favorite() {
                            if (book.favorite) return "★";
                            return "";
                        };

                        const row_id = id_gen();

                        const row = document.createElement("div");
                        row.setAttribute("class", "book__row");
                        row.setAttribute("id", row_id);
                        row.setAttribute("onclick", `open_book('${book.id}')`);

                        row.innerHTML = `
                            <div class="book__title">${book.title}</div>

                            <div class="book__info">
                                <div class="book__progress" title="${tr("read_title")}">${if_book_reading(book.progress, book.read)}</div>
                                <div class="book__favorite" title="${tr("favorite_title")}">${if_favorite()}</div>
                                <div class="book__actions_button" title="${tr("book_actions_title")}" onclick="event.stopPropagation(); show_actions_tools('${book.id}', ${book.favorite}, ${book.read}, '${row_id}')"><b>&#8942;</b></div>
                            </div>
                        `;

                        sec.appendChild(row);
                    });

                    books_list.appendChild(sec);
                });

                toolbar_title.innerHTML = `${tr("library")} &nbsp;&nbsp; [ ${books.length} ]`;
            };
        };

            if (!is_fullscreen()) {

                } else {
                    window.alert(tr("f11_exit_message"));

            }
        }

            toggle_fullscreen();
        });

        font_size_minus_button.addEventListener("click", async () => {
            let stored_font = await get_settings("font");
            if (stored_font.size > 10) {
                stored_font.size -= 1;
                await set_font(stored_font);
                init_font();
            }
        });

        font_size_plus_button.addEventListener("click", async () => {
            let stored_font = await get_settings("font");
            if (stored_font.size < 60) {
                stored_font.size += 1;
                await set_font(stored_font);
                init_font();
            }
        });

        line_height_minus_button.addEventListener("click", async () => {
            let stored_font = await get_settings("font");
            if (stored_font.lineHeight > 1.0) {
                stored_font.lineHeight = parseFloat((stored_font.lineHeight - 0.1).toFixed(1));
                await set_font(stored_font);
                init_font();
            }
        });

        line_height_plus_button.addEventListener("click", async () => {
            let stored_font = await get_settings("font");
            if (stored_font.lineHeight < 3.0) {
                stored_font.lineHeight = parseFloat((stored_font.lineHeight + 0.1).toFixed(1));
                await set_font(stored_font);
                init_font();
            }
        });

        vertical_paddings_minus_button.addEventListener("click", async () => {
            let stored_paddings = await get_settings("paddings");
            if (stored_paddings.vertical > 0) {
                stored_paddings.vertical -= 1;
                await set_paddings(stored_paddings);
                init_paddings();
            }
        });

        vertical_paddings_plus_button.addEventListener("click", async () => {
            let stored_paddings = await get_settings("paddings");
            if (stored_paddings.vertical < 20) {
                stored_paddings.vertical += 1;
                await set_paddings(stored_paddings);
                init_paddings();
            }
        });

        horizontal_paddings_minus_button.addEventListener("click", async () => {
            let stored_paddings = await get_settings("paddings");
            if (stored_paddings.horizontal > 0) {
                stored_paddings.horizontal -= 1;
                await set_paddings(stored_paddings);
                init_paddings();
            }
        });

        horizontal_paddings_plus_button.addEventListener("click", async () => {
            let stored_paddings = await get_settings("paddings");
            if (stored_paddings.horizontal < 40) {
                stored_paddings.horizontal += 1;
                await set_paddings(stored_paddings);
                init_paddings();
            }
        });

        font_family_select.addEventListener("change", async (event) => {
            let stored_font = await get_settings("font");
            stored_font.family = event.target.value;
            await set_font(stored_font);
            init_font();
        });

        font_weight_button.addEventListener("click", async () => {
            let stored_font = await get_settings("font");
            stored_font.weight = stored_font.weight === "bold" ? "normal" : "bold";
            await set_font(stored_font);
            init_font();
        });

        font_style_button.addEventListener("click", async () => {
            let stored_font = await get_settings("font");
            stored_font.style = stored_font.style === "italic" ? "normal" : "italic";
            await set_font(stored_font);
            init_font();
        });

        search_field.addEventListener("input", () => render_library());

        add_book_button.addEventListener("click", () => {
            close_toolbox();
            add_file_input.click()
        });

        add_file_input.addEventListener("change", async (event) => {
            const files = Array.from(event.target.files);

            for (const file of files) {
                const text = await file.text();
                const doc = new DOMParser().parseFromString(text, "text/html");

                if (doc.querySelectorAll("p").length > 0) {
                    doc.querySelectorAll("p").forEach((p, index) => {
                        p.id = id_gen();
                    });
                } else {
                    doc.querySelectorAll("br").forEach((br, index) => {
                        br.id = id_gen();
                    });
                };

                const bookData = {
                    id: id_gen(4),
                    favorite: false,
                    read: false,
                    position: false,
                    progress: 0,
                    recent: 0,
                    author: doc.querySelector("h2")?.innerText.trim() || tr("unknown_author"),
                    title: doc.querySelector("h1")?.innerText.trim() || file.name.replace(".html", ""),
                    content: doc.body.innerHTML
                };

                const tx = db.transaction("books", "readwrite");
                tx.objectStore("books").put(bookData);
            }

            render_library();
        });

        clear_library_button.addEventListener("click", () => {
            close_toolbox();
            create_dialog_window(tr("clear_library_question"), "clear_library()");
        });

        language_button.addEventListener("click", () => {
            toolbox_main_tools.style.display = "none";
            language_list.style.display = "flex";
        });

        back_button.addEventListener("click", () => {
            language_list.style.display = "none";
            toolbox_main_tools.style.display = "flex";
        });

        back_to_library_button.addEventListener("click", () => {
            clearInterval(set_reading_progress);
            reader_container.style.display = "none";
            is_lib_screen = true;
            toggle_tools();
            render_library();
            window.scrollTo(0, parseFloat(library_position));
        });

        clear_search_button.addEventListener("click", () => {
            search_field.value = "";
            render_library();
        })



        // Enable close zone
        function enable_close_zone() {
            close_zone.style.display = "flex";
        };

        // Disable close zone
        function disable_close_zone() {
            close_zone.style.display = "none";
        };

        // Create dialog window
        function create_dialog_window(content, fn) {
            if (is_actions_tools) close_actions_tools();

            dialog_window_text.innerHTML = content;
            dialog_window.style.display = "flex";
            confirm_button.setAttribute("onclick", fn);
        };

        // Reset dialog window
        function reset_dialog_window() {
            dialog_window.style.display = "none";
            dialog_window_text.innerHTML = "";
            confirm_button.removeAttribute("onclick");
        };

        // Close toolbox
        function close_toolbox() {
            is_toolbox = false;
            toolbox_container.style.display = "none";
            disable_close_zone()
        };

        // Toggle tools
        function toggle_tools() {
            if (is_lib_screen) {
                toolbox_library_tools.style.display = "flex";
                toolbox_reader_tools.style.display = "none";
            } else {
                toolbox_library_tools.style.display = "none";
                toolbox_reader_tools.style.display = "flex";
            };
        };

        // Close actions tools
        function close_actions_tools() {
            document.getElementById(active_row_actions).remove();
            is_actions_tools = false;
            active_row_actions = false;
            disable_close_zone()
        };

        // Delete all books in library
        function clear_library() {
            db.transaction("books", "readwrite").objectStore("books").clear();
            reset_dialog_window();
            app_reload();
        };

        // Open selected book
        async function open_book(id) {
            const book = await new Promise((resolve) => {
                const tx = db.transaction("books", "readonly");
                const store = tx.objectStore("books");
                const req = store.get(id);
                req.onsuccess = () => resolve(req.result);
                req.onerror = function (event) { window.alert(event.target.error) };
            });

            if (book) {
                active_book = id;
                is_lib_screen = false;
                toggle_tools();
                change_recent(id);
                update_reading_progress();

                library_container.style.display = "none";
                reader_container.style.display = "flex";
                toolbar_title.innerHTML = `${book.title} — ${book.author}`;
                toolbar_progress_indicator.innerHTML = `${book.progress}%`;
                toolbar_progress_indicator.style.display = "block";
                reader_book.innerHTML = book.content;

                if (book.position) {
                    book_position = book.position;
                    scroll_to_paragraph();
                } else {
                    window.scrollTo(0, 0);
                };

                const winScroll = document.documentElement.scrollTop;
                const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
                const scrolled = height > 0 ? (winScroll / height) * 100 : 0;

                toolbar_progress_indicator.innerHTML = scrolled.toFixed(0) + "%";
                root_style.setProperty("--scrollbar-progress", scrolled.toFixed(0) + "%");
            };
        };

        // Change recent
        function change_recent(id) {
            const tx = db.transaction(["books"], "readwrite");
            const store = tx.objectStore("books");

            const req = store.get(id);

            req.onsuccess = function () {
                const book = req.result;

                if (book) {
                    book.recent = Date.now();

                    const updateRequest = store.put(book);

                    updateRequest.onerror = (event) => {
                        window.alert(event.target.error);
                    };
                };
            };

            req.onerror = function (event) { window.alert(event.target.error) };
        };

        // Update book position
        window.onscroll = () => {
            const winScroll = document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = height > 0 ? (winScroll / height) * 100 : 0;

            toolbar_progress_indicator.innerHTML = scrolled.toFixed(0) + "%";
            root_style.setProperty("--scrollbar-progress", scrolled.toFixed(0) + "%");

            if (!is_lib_screen && active_book) {
                book_position = get_current_paragraph_id();
            } else {
                library_position = window.scrollY;
            };
        };

        function get_current_paragraph_id() {
            let closest_id = null;
            let min_dist = Infinity;

            if (document.querySelectorAll("p").length > 0) {
                const paragraphs = document.querySelectorAll("p");

                paragraphs.forEach(p => {
                    const rect = p.getBoundingClientRect();
                    const dist = Math.abs(rect.top);

                    if (rect.top < 100 && dist < min_dist) {
                        min_dist = dist;
                        closest_id = p.id;
                    }
                });
            } else {
                const row = document.querySelectorAll("br");

                row.forEach(br => {
                    const rect = br.getBoundingClientRect();
                    const dist = Math.abs(rect.top);

                    if (rect.top < 100 && dist < min_dist) {
                        min_dist = dist;
                        closest_id = br.id;
                    }
                });
            };

            return closest_id;
        }

        function update_reading_progress() {
            set_reading_progress = setInterval(() => {
                if (book_position === interval_book_position) return;

                interval_book_position = book_position;

                const winScroll = document.documentElement.scrollTop;
                const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
                const scrolled = height > 0 ? (winScroll / height) * 100 : 0;

                const tx = db.transaction(["books"], "readwrite");
                const store = tx.objectStore("books");

                const req = store.get(active_book);

                req.onsuccess = function () {
                    const book = req.result;

                    if (book) {
                        book.progress = scrolled.toFixed(0);
                        book.position = book_position;

                        if (scrolled.toFixed(0) >= 100) {
                            book.read = true;
                        };

                        const updateRequest = store.put(book);

                        updateRequest.onsuccess = () => { };

                        updateRequest.onerror = (event) => {
                            window.alert(event.target.error);
                        };
                    };
                };

                req.onerror = function (event) { window.alert(event.target.error) };
            }, 1000);
        };

        function scroll_to_paragraph() {
            const recent_paragraph = document.getElementById(book_position);
            const recent_paragraph_position = recent_paragraph.getBoundingClientRect().top + window.scrollY;
            const offset_position = recent_paragraph_position - 30;

            window.scrollTo({ top: offset_position });
        }

        // Indicator of reading progress
        function if_book_reading(progress_info = 0, read_info = false) {
            if (read_info) return "✔";
            if (progress_info > 0 && progress_info < 100) return progress_info + "%";
            return "";
        };

        // Show actions tools
        function show_actions_tools(book_id, book_favorite, book_read, row_id) {
            active_book = book_id;
            is_actions_tools = true;
            enable_close_zone();
            add_actions_tools(book_id, book_favorite, book_read, row_id);
        };

        // Add actions tools
        function add_actions_tools(book_id, book_favorite, book_read, row_id) {
            const row = document.getElementById(row_id);
            const actions_box_id = id_gen();

            active_row_actions = actions_box_id;

            const act = document.createElement("div");
            act.setAttribute("class", "actions_tools__container");
            act.setAttribute("id", active_row_actions);
            act.setAttribute("name", book_id);

            act.innerHTML = `
                <button class="toolbox__button" type="button" 
                    onclick="event.stopPropagation(); toggle_favorite()" >
                    ${book_favorite ? tr("remove_from_favorites") : tr("add_to_favorites")}
                </button>

                <button class="toolbox__button" type="button"
                    onclick="event.stopPropagation(); toggle_read()" >
                    ${book_read ? tr("mark_as_unread") : tr("mark_as_read")}
                </button>

                <button class="toolbox__button" type="button" 
                    onclick="event.stopPropagation(); rename_book_content()" >
                    ${tr("rename_book")}
                </button>

                <button class="toolbox__button" type="button" 
                    onclick="event.stopPropagation(); create_dialog_window('${tr("delete_book_question")}', 'delete_book()')" >
                    ${tr("delete_book")}
                </button>
            `;

            row.appendChild(act);
        };

        // Add to favorites or remove from favorites
        function toggle_favorite() {
            const tx = db.transaction(["books"], "readwrite");
            const store = tx.objectStore("books");

            const req = store.get(active_book);

            req.onsuccess = function () {
                const book = req.result;

                if (book) {
                    book.favorite = !book.favorite;

                    const updateRequest = store.put(book);

                    updateRequest.onsuccess = () => {
                        render_library();
                    };

                    updateRequest.onerror = (event) => {
                        window.alert(event.target.error);
                    };
                };
            };

            req.onerror = function (event) { window.alert(event.target.error) };
        };

        // Toggle read
        function toggle_read() {
            const tx = db.transaction(["books"], "readwrite");
            const store = tx.objectStore("books");

            const req = store.get(active_book);

            req.onsuccess = function () {
                const book = req.result;

                if (book) {
                    book.read = !book.read;

                    const updateRequest = store.put(book);

                    updateRequest.onsuccess = () => {
                        render_library();
                    };

                    updateRequest.onerror = (event) => {
                        window.alert(event.target.error);
                    };
                };
            };

            req.onerror = function (event) { window.alert(event.target.error) };
        };

        // Rename book name or author
        async function rename_book_content() {
            const book = await new Promise((resolve) => {
                const tx = db.transaction("books", "readonly");
                const store = tx.objectStore("books");
                const req = store.get(active_book);
                req.onsuccess = () => resolve(req.result);
            });

            if (book) {
                const content = `
                    <div class="rename_book__form">
                        <span><b>${tr("book_author")}:</b></span>
                        <input class="rename_book__input" type="text" id="edit_author" value="${book.author}">

                        <span><b>${tr("book_title")}:</b></span>
                        <input class="rename_book__input" type="text" id="edit_title" value="${book.title}">

                        <span class="rename_book__question">${tr("rename_book_question")}</span>
                    </div>
                `;

                create_dialog_window(content, "rename_book()");
            }
        };

        function rename_book() {
            const newAuthor = document.getElementById("edit_author").value;
            const newTitle = document.getElementById("edit_title").value;

            const tx = db.transaction("books", "readwrite");
            const store = tx.objectStore("books");

            const req = store.get(active_book);

            req.onsuccess = () => {
                const data = req.result;
                data.author = newAuthor;
                data.title = newTitle;
                store.put(data);

                reset_dialog_window();
                render_library();
            };

            req.onerror = function (event) { window.alert(event.target.error) };
        };

        // Delete book from library
        function delete_book() {
            db.transaction("books", "readwrite").objectStore("books").delete(active_book);
            reset_dialog_window();
            render_library();
        };

        // Changes the language of the program
        async function change_language(lng) {
            document.documentElement.setAttribute("lang", lng);
            await set_setting("lang", lng);
            app_reload();
        };

        // Get settings from database
        async function get_settings(key) {
            const settings = await new Promise((resolve) => {
                const tx = db.transaction("settings", "readonly");
                const store = tx.objectStore("settings");
                const req = store.get(key);

                req.onsuccess = () => resolve(req.result);
                req.onerror = function (event) { window.alert(event.target.error) };
            });

            if (settings) {
                return settings.value;
            };
        };

        // Set settings in database
        async function set_setting(key, value) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction("settings", "readwrite");
                const store = tx.objectStore("settings");
                const req = store.put({ key: key, value: value });

                req.onsuccess = () => resolve();
                req.onerror = function (event) {
                    window.alert(event.target.error);
                    reject(event.target.error);
                };
            });
        }

        async function set_language(l = window.clientInformation.language) {
            lang = l;
            await set_setting("lang", lang);
            return lang;
        }

        async function set_font(f = { size: 20, family: "Arial, Helvetica, sans-serif", weight: "normal", style: "normal", lineHeight: 1.5 }) {
            await set_setting("font", f);
            return f;
        }

        async function set_paddings(p = { horizontal: 20, vertical: 2 }) {
            await set_setting("paddings", p);
            return p;
        }

        // ID generator
        function id_gen(n = 1) {
            let id = "";
            for (let i = 1; i <= n; i++) { id = id + Math.random().toString(36).substring(2, 10); };
            return id;
        };

        // Intervals
        setInterval(() => {
            navigator.getBattery().then((battery) => {
                const date = new Date()
                const hours = date.getHours() < 10 ? "0" + date.getHours().toString() : date.getHours().toString();
                const minutes = date.getMinutes() < 10 ? "0" + date.getMinutes().toString() : date.getMinutes().toString();

                battery_level = battery.level;
                is_battery_charging = battery.charging;

                toolbar__time.innerHTML = `${hours}:${minutes}`;
                toolbar_battery_info.innerHTML = `${(battery.level * 100).toFixed(0)}%`;
            });
        }, 1000);
    </script>
</body>

</html>
